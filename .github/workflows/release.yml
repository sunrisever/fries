name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows
            pack_script: pack:release
          - os: ubuntu-latest
            artifact_name: linux
            pack_script: pack:linux
          - os: macos-latest
            artifact_name: macos
            pack_script: pack:mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build artifacts
        run: npm run ${{ matrix.pack_script }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fries-${{ matrix.artifact_name }}
          path: release/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          body_path: docs/publishing/RELEASE_NOTES_0.4.0-beta.md
          files: release-assets/*
