name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows
            pack_script: pack:ci:release
          - os: macos-latest
            artifact_name: macos
            pack_script: pack:ci:mac
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --prefer-offline

      - name: Prepare Apple API key
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          if [ -z "$APPLE_API_KEY_P8_BASE64" ] || [ -z "$APPLE_API_KEY_ID" ]; then
            echo "Apple API key secret not configured; skip key preparation."
            exit 0
          fi
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build artifacts
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            if [ -n "$CSC_LINK" ] || [ -n "$APPLE_API_KEY_ID" ] || [ -n "$APPLE_ID" ]; then
              npm run ${{ matrix.pack_script }}
            else
              npm run build
              CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --publish never --mac zip dmg --config.mac.identity=null
            fi
          else
            npm run ${{ matrix.pack_script }}
          fi

      - name: Prepare workflow artifacts
        shell: bash
        run: |
          mkdir -p release-ci
          shopt -s nullglob
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            patterns=(
              "release/Fries-*.zip"
              "release/Fries-*.dmg"
              "release/latest-mac.yml"
            )
          else
            patterns=(
              "release/Fries-Setup-*.exe"
              "release/Fries-Portable-*.exe"
              "release/latest.yml"
            )
          fi
          for pattern in "${patterns[@]}"; do
            for file in $pattern; do
              cp "$file" release-ci/
            done
          done
          ls -al release-ci

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v5
        with:
          name: fries-${{ matrix.artifact_name }}
          path: release-ci/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-final
          shopt -s nullglob
          patterns=(
            "release-assets/Fries-Setup-*.exe"
            "release-assets/Fries-Portable-*.exe"
            "release-assets/latest.yml"
            "release-assets/latest-mac.yml"
            "release-assets/Fries-*.zip"
            "release-assets/Fries-*.dmg"
          )
          for pattern in "${patterns[@]}"; do
            for file in $pattern; do
              cp "$file" release-final/
            done
          done
          ls -al release-final

      - name: Resolve release notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_PATH="docs/publishing/RELEASE_NOTES_${VERSION}.md"
          if [ -f "$NOTES_PATH" ]; then
            echo "RELEASE_NOTES_PATH=$NOTES_PATH" >> "$GITHUB_ENV"
          else
            echo "RELEASE_NOTES_PATH=CHANGELOG.md" >> "$GITHUB_ENV"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          files: release-final/*
